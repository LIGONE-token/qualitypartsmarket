<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RFQ Offers</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="header">
<img src="logo1.png" class="logo">
</header>

<div class="container">

<h1>Offers for this RFQ</h1>

<div id="offersList"></div>

</div>
<script>

const supabaseClient = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
)

const urlParams = new URLSearchParams(window.location.search)
const rfqId = urlParams.get("rfq")
  if(!rfqId){
alert("RFQ not found")
window.location.href="index.html"
}

async function loadOffers(){

const { data, error } = await supabaseClient
.from("offers")
.select("*")
.eq("rfq_id", rfqId)
.order("price",{ascending:true})

if(error){
console.error(error)
alert("Offers could not be loaded")
return
}

const container = document.getElementById("offersList")
if(data.length === 0){
container.innerHTML = "<p>No offers yet.</p>"
return
}
data.forEach(offer =>{

const div = document.createElement("div")

div.className = "card"

div.innerHTML = `
<h3>Supplier: ${offer.supplier_email || "Supplier"}</h3>

<p><strong>Price:</strong> ${offer.price}</p>
<p><strong>Delivery:</strong> ${offer.delivery_days} days</p>

<p>${offer.message || ""}</p>
`<button class="btn-main" onclick="acceptOffer('${offer.id}')">
Accept Offer
</button>

container.appendChild(div)

})

}

loadOffers()

</script>

</body>
</html>
