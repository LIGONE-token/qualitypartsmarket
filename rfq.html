<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Request a Quote | QualityPartsMarket</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f6f8fb;
color:#1e2a36;
}

/* HEADER */

.header{
height:72px;
background:white;
display:flex;
align-items:center;
padding:0 60px;
box-shadow:0 1px 6px rgba(0,0,0,0.08);
}

.logo{
height:80px;
width:auto;
}

/* CONTAINER */

.container{
max-width:900px;
margin:80px auto;
background:white;
padding:50px;
border-radius:10px;
box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

/* FORM */

h1{
margin-bottom:30px;
}

label{
font-weight:600;
display:block;
margin-top:20px;
}

input, textarea{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #d9dde2;
border-radius:6px;
font-size:15px;
}

textarea{
height:120px;
}

/* BUTTON */

button{
margin-top:30px;
background:#d39b18;
color:white;
padding:14px 26px;
border:none;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<header class="header">
<img src="logo1.png" class="logo">
</header>

<div class="container">

<h1>Request a Quote</h1>

<form>

<label>Company Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Material</label>
<input type="text">

<label>Quantity</label>
<input type="number">

<label>Message</label>
<textarea></textarea>

<button type="submit">Send Request</button>

</form>

</div>

</body>
</html>
