<body>

<header class="header">
<img src="logo1.png" class="logo">
</header>

<div class="container">

<h1>Request a Quote</h1>

<form action="https://formsubmit.co/rene.herrchen@gmail.com" method="POST" enctype="multipart/form-data">

<label>Company Name</label>
<input type="text" name="company" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Material</label>
<input type="text" name="material">

<label>Quantity</label>
<input type="number" name="quantity">

<label>Upload Drawing</label>
<input type="file" name="drawing">

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Send RFQ</button>

<input type="hidden" name="_captcha" value="false">

</form>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabase = supabase.createClient(
"https://hwpeegcsdgxgcybuosfv.supabase.co",
"sb_publishable_LhuHoUS_DR4o2Pp3aqbNBw_IXwHo2fD"
)

document.getElementById("rfqForm").addEventListener("submit", async (e)=>{

e.preventDefault()

const file = document.getElementById("drawing").files[0]

let path=""

if(file){

const upload = await supabase.storage
.from("drawings")
.upload(Date.now()+"_"+file.name,file)

path = upload.data.path

}

await supabase.from("rfq").insert([{

company:document.getElementById("company").value,
email:document.getElementById("email").value,
material:document.getElementById("material").value,
quantity:document.getElementById("quantity").value,
message:document.getElementById("message").value,
drawing_url:path

}])

alert("RFQ submitted successfully")

})

</script>
