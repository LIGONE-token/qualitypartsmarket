.container{

}

<form action="https://formsubmit.co/rene.herrchen@gmail.com" method="POST">

<label>Company Name</label>
<input type="text" required>

<label>Country</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Main Manufacturing Process</label>
<select>
<option>CNC Turning</option>
<option>CNC Milling</option>
<option>Grinding</option>
<option>Heat Treatment</option>
<option>Surface Finishing</option>
<option>Assembly</option>
</select>

<label>Materials</label>
<input type="text" placeholder="Steel, Stainless Steel, Aluminium">

<label>Additional Information</label>
<textarea></textarea>

<button type="submit">Register as Supplier</button>

</form>
